<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Sent Successfully</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        font-family: "Poppins", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;

        /* Dynamic animated gradient background */
        background: linear-gradient(135deg, #6dd5fa, #2980b9, #6dd5fa);
        background-size: 300% 300%;
        animation: gradientFlow 12s ease infinite;
    }

    @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        text-align: center;
        animation: fadeIn 1.5s ease forwards;
        z-index: 5;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Main Robot */
    .robot-main {
        width: 230px;
        animation: float 3.5s ease-in-out infinite;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-18px); }
        100% { transform: translateY(0px); }
    }

    h1 {
        color: #fff;
        font-size: 40px;
        margin-top: 20px;
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    p {
        color: #e8f7ff;
        font-size: 20px;
        margin-bottom: 30px;
    }

    .btn {
        padding: 15px 40px;
        background: #ffffff;
        color: #0b5fff;
        font-weight: 700;
        border-radius: 40px;
        text-decoration: none;
        font-size: 18px;
        box-shadow: 0 10px 25px rgba(255,255,255,0.3);
        transition: 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-4px);
        background: #0b5fff;
        color: #fff;
    }

    /* Floating Extra Robots */
    .robot-mini {
        position: absolute;
        width: 90px;
        opacity: 0.9;
        animation: miniFloat 6s infinite ease-in-out;
    }

    @keyframes miniFloat {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-25px) rotate(10deg); }
        100% { transform: translateY(0) rotate(0deg); }
    }

    .robot1 { top: 10%; left: 8%; animation-duration: 5s; }
    .robot2 { bottom: 15%; right: 10%; animation-duration: 7s; }
    .robot3 { top: 65%; left: 25%; animation-duration: 6.5s; }

    /* Floating translucent shapes */
    .shape {
        position: absolute;
        border-radius: 50%;
        opacity: 0.35;
        filter: blur(2px);
        animation: shapeMove 10s infinite alternate ease-in-out;
    }

    @keyframes shapeMove {
        0% { transform: translateY(0px) scale(1); }
        100% { transform: translateY(-30px) scale(1.1); }
    }

    .shape1 { width: 200px; height: 200px; background: #ffffff2c; top: 10%; left: 18%; }
    .shape2 { width: 150px; height: 150px; background: #ffffff2c; bottom: 10%; right: 15%; animation-duration: 7s; }
    .shape3 { width: 120px; height: 120px; background: #ffffff2c; top: 70%; left: 5%; animation-duration: 9s; }
    .shape4 { width: 170px; height: 170px; background: #ffffff2c; bottom: 20%; left: 45%; animation-duration: 8s; }

</style>
</head>

<body>

    <!-- Floating Shapes -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>

    <!-- Mini Floating Robots -->
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712045.png" class="robot-mini robot1" alt="">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712074.png" class="robot-mini robot2" alt="">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712112.png" class="robot-mini robot3" alt="">

    <div class="container">
        <!-- Main Robot -->
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712050.png" class="robot-main" alt="Robot">

        <h1>Your Message Has Been Sent! 🚀</h1>
        <p>I’ve received your details — I’ll get back to you shortly!</p>

        <a href="index.html" class="btn">Return to Home</a>
    </div>

</body>
</html>
